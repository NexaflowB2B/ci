name: Standard Microservice CI

on:
  workflow_call:

jobs:
  devsecops-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Required to upload SARIF files
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required by SonarQube

      - name: Set up Python
        if: hashFiles('requirements.txt') != ''
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ── 1. SonarQube ────────────────────────────────────────────────────────
      - name: SonarQube Scan
        id: sonar
        continue-on-error: true # Allow us to catch failure for notification
        uses: SonarSource/sonarqube-scan-action@v3
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        id: sonarqube-quality-gate-check
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Notify Sonar Failure
        if: steps.sonar.outcome == 'failure' || steps.sonarqube-quality-gate-check.outcome == 'failure'
        uses: NexaflowB2B/ci/.github/actions/notify@main
        with:
          status: 'failed'
          pipeline: 'CI'
          job_name: 'sonarqube'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          sonar_project_key: ${{ github.event.repository.name }}

      # No Halt on Sonar Failure: We allow the pipeline to continue even if the Sonar server is unreachable.

      # ── 2. Snyk ─────────────────────────────────────────────────────────────
      - name: Snyk Test
        if: hashFiles('requirements.txt') != ''
        id: snyk
        continue-on-error: true
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Check Snyk SARIF
        if: always()
        run: |
          if [ -f snyk.sarif ] && [ -s snyk.sarif ]; then
            echo "snyk_sarif_exists=true" >> $GITHUB_ENV
          else
            echo "snyk_sarif_exists=false" >> $GITHUB_ENV
          fi

      - name: Upload Snyk SARIF to GitHub Security tab
        if: env.snyk_sarif_exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Notify Snyk Failure
        if: steps.snyk.outcome == 'failure'
        uses: NexaflowB2B/ci/.github/actions/notify@main
        with:
          status: 'failed'
          pipeline: 'CI'
          job_name: 'snyk-sca'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}

      # ── 3. Docker Build ─────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Image Metadata
        id: prep
        run: |
          # Lowercase the repository name for Docker compliance
          IMAGE_ID=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Get the 5-character short SHA
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-5)
          echo "image_name=${IMAGE_ID}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        id: docker_build
        continue-on-error: true
        run: |
          docker build -t ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.short_sha }} .

      - name: Notify Docker Build Failure
        if: steps.docker_build.outcome == 'failure'
        uses: NexaflowB2B/ci/.github/actions/notify@main
        with:
          status: 'failed'
          pipeline: 'Docker'
          job_name: 'docker-build'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.short_sha }}

      - name: Halt on Docker Build Failure
        if: steps.docker_build.outcome == 'failure'
        run: exit 1

      # ── 4. Trivy ────────────────────────────────────────────────────────────
      - name: Scan Docker Image with Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.short_sha }}
          format: 'sarif'
          output: 'trivy.sarif'
          exit-code: 1
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Check Trivy SARIF
        if: always()
        run: |
          if [ -f trivy.sarif ] && [ -s trivy.sarif ]; then
            echo "trivy_sarif_exists=true" >> $GITHUB_ENV
          else
            echo "trivy_sarif_exists=false" >> $GITHUB_ENV
          fi

      - name: Upload Trivy SARIF
        if: env.trivy_sarif_exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Notify Trivy Failure
        if: steps.trivy.outcome == 'failure'
        uses: NexaflowB2B/ci/.github/actions/notify@main
        with:
          status: 'failed'
          pipeline: 'Docker'
          job_name: 'trivy-scan'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.short_sha }}

      - name: Halt on Trivy Failure
        if: steps.trivy.outcome == 'failure'
        run: exit 1

      # ── 5. Docker Push ──────────────────────────────────────────────────────
      - name: Push Docker Image
        id: docker_push
        continue-on-error: true
        run: |
          docker push ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.short_sha }}

      - name: Notify Docker Push Failure
        if: steps.docker_push.outcome == 'failure'
        uses: NexaflowB2B/ci/.github/actions/notify@main
        with:
          status: 'failed'
          pipeline: 'Docker'
          job_name: 'docker-push'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.short_sha }}

      - name: Halt on Docker Push Failure
        if: steps.docker_push.outcome == 'failure'
        run: exit 1

      # ── 6. Success Notification ─────────────────────────────────────────────
      - name: Validate Helm Repo Token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.HELM_REPO_TOKEN == ''
        shell: bash
        run: |
          echo "::error::Missing HELM_REPO_TOKEN secret. Add a repository or organization secret named HELM_REPO_TOKEN with write access to NexaflowB2B/nexaflow-helm."
          exit 1

      - name: Checkout Helm Repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.HELM_REPO_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: NexaflowB2B/nexaflow-helm
          token: ${{ secrets.HELM_REPO_TOKEN }}
          ref: main
          path: helm-repo

      - name: Install yq
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.HELM_REPO_TOKEN != ''
        shell: bash
        run: |
          YQ_VERSION=v4.44.3
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update values-dev image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.HELM_REPO_TOKEN != ''
        id: update_helm_values
        shell: bash
        run: |
          APP_NAME="${{ github.event.repository.name }}"
          IMAGE_TAG="${{ steps.prep.outputs.short_sha }}"
          VALUES_FILE="helm-repo/apps/${APP_NAME}/values-dev.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Missing Helm values file: $VALUES_FILE"
            exit 1
          fi

          export IMAGE_TAG
          yq -i '.image = (.image // {}) | .image.tag = strenv(IMAGE_TAG)' "$VALUES_FILE"

          if git -C helm-repo diff --quiet -- "apps/${APP_NAME}/values-dev.yaml"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push Helm tag update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.HELM_REPO_TOKEN != '' && steps.update_helm_values.outputs.changed == 'true'
        shell: bash
        run: |
          APP_NAME="${{ github.event.repository.name }}"
          IMAGE_TAG="${{ steps.prep.outputs.short_sha }}"

          git -C helm-repo config user.name "github-actions[bot]"
          git -C helm-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C helm-repo add "apps/${APP_NAME}/values-dev.yaml"
          git -C helm-repo commit -m "chore(${APP_NAME}): update dev image tag to ${IMAGE_TAG}"
          git -C helm-repo push origin main

      - name: Notify Success
        if: success()
        uses: NexaflowB2B/ci/.github/actions/notify@main
        with:
          status: 'success'
          pipeline: 'Docker'
          job_name: 'all'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.short_sha }}
