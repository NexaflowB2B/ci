name: Standard Microservice CI

on:
  workflow_call:

jobs:
  devsecops-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Required to upload SARIF files
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required by SonarQube

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ── 1. SonarQube ────────────────────────────────────────────────────────
      - name: SonarQube Scan
        id: sonar
        continue-on-error: true # Allow us to catch failure for notification
        uses: SonarSource/sonarqube-scan-action@v3
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        id: sonarqube-quality-gate-check
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Notify Sonar Failure
        if: steps.sonar.outcome == 'failure' || steps.sonarqube-quality-gate-check.outcome == 'failure'
        uses: ./.github/actions/notify
        with:
          status: 'failed'
          pipeline: 'CI'
          job_name: 'sonarqube'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          sonar_project_key: ${{ github.event.repository.name }}

      - name: Halt on Sonar Failure
        if: steps.sonar.outcome == 'failure' || steps.sonarqube-quality-gate-check.outcome == 'failure'
        run: exit 1

      # ── 2. Snyk ─────────────────────────────────────────────────────────────
      - name: Snyk Test
        id: snyk
        continue-on-error: true
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Notify Snyk Failure
        if: steps.snyk.outcome == 'failure'
        uses: ./.github/actions/notify
        with:
          status: 'failed'
          pipeline: 'CI'
          job_name: 'snyk-sca'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}

      - name: Halt on Snyk Failure
        if: steps.snyk.outcome == 'failure'
        run: exit 1

      # ── 3. Docker Build ─────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        id: docker_build
        continue-on-error: true
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Notify Docker Build Failure
        if: steps.docker_build.outcome == 'failure'
        uses: ./.github/actions/notify
        with:
          status: 'failed'
          pipeline: 'Docker'
          job_name: 'docker-build'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ghcr.io/${{ github.repository }}

      - name: Halt on Docker Build Failure
        if: steps.docker_build.outcome == 'failure'
        run: exit 1

      # ── 4. Trivy ────────────────────────────────────────────────────────────
      - name: Scan Docker Image with Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: 'sarif'
          output: 'trivy.sarif'
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Notify Trivy Failure
        if: steps.trivy.outcome == 'failure'
        uses: ./.github/actions/notify
        with:
          status: 'failed'
          pipeline: 'Docker'
          job_name: 'trivy-scan'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ghcr.io/${{ github.repository }}

      - name: Halt on Trivy Failure
        if: steps.trivy.outcome == 'failure'
        run: exit 1

      # ── 5. Docker Push ──────────────────────────────────────────────────────
      - name: Push Docker Image
        id: docker_push
        continue-on-error: true
        run: docker push ghcr.io/${{ github.repository }}:latest

      - name: Notify Docker Push Failure
        if: steps.docker_push.outcome == 'failure'
        uses: ./.github/actions/notify
        with:
          status: 'failed'
          pipeline: 'Docker'
          job_name: 'docker-push'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ghcr.io/${{ github.repository }}

      - name: Halt on Docker Push Failure
        if: steps.docker_push.outcome == 'failure'
        run: exit 1

      # ── 6. Success Notification ─────────────────────────────────────────────
      - name: Notify Success
        if: success()
        uses: ./.github/actions/notify
        with:
          status: 'success'
          pipeline: 'Docker'
          job_name: 'all'
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.EMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.EMAIL_PASSWORD }}
          notify_email_to: ${{ secrets.DEVOPS_EMAIL }}
          docker_image: ghcr.io/${{ github.repository }}
